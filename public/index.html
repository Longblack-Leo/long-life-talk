<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>롱블랙 × 현대자동차 UX스튜디오 · 보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  body {
    min-height: 100%;
    display: grid;
    place-items: center;
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--paper-2), var(--paper));
    padding: 40px 20px;
  }
  .wrap { width: min(880px, 100%); }
  header { text-align: center; margin-bottom: 48px; }
  .overline { display: block; margin-bottom: 18px; }
  h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(2.4rem, 6vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  h1 em { color: var(--gold); font-style: italic; }
  .sub { margin-top: 16px; color: var(--muted); font-size: 1rem; }
  .grid { display: grid; gap: 18px; grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  .card {
    display: block;
    text-decoration: none;
    color: var(--ink);
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 50px -14px rgba(22,20,15,0.34); }
  .card .num { font-family: var(--serif); color: var(--gold); font-size: 0.9rem; letter-spacing: 0.2em; }
  .card h2 { font-size: 1.3rem; margin: 12px 0 8px; }
  .card p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
  footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body class="grain">
  <div class="wrap">
    <header>
      <span class="overline">COMMUNITY BOARD</span>
      <h1>롱블랙 &times; 현대자동차 <em>UX스튜디오</em></h1>
      <p class="sub">오프라인 커뮤니티 보드 · 아래에서 역할에 맞는 화면을 여세요</p>
    </header>
    <div class="grid">
      <a class="card" href="/stage" target="_blank">
        <span class="num">01 / STAGE</span>
        <h2>무대 스크린</h2>
        <p>대형 스크린에 대질문과 조별 답변을 말풍선으로 띄웁니다. 빔프로젝터·TV에 연결하세요.</p>
      </a>
      <a class="card" href="/group" target="_blank">
        <span class="num">02 / GROUP</span>
        <h2>조별 노트북</h2>
        <p>각 조 노트북에서 엽니다. 처음 한 번 조 번호를 선택하면 그 조로 고정됩니다.</p>
      </a>
      <a class="card" href="/admin" target="_blank">
        <span class="num">03 / ADMIN</span>
        <h2>어드민 콘솔</h2>
        <p>질문 변경, 노출 모드 전환, 대표 답변 채택을 진행자가 제어합니다.</p>
      </a>
    </div>
    <footer>2026.06.12 · LG베스트샵 수원본점</footer>
  </div>
</body>
</html>
