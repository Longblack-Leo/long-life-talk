<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>롱블랙 × 현대자동차 UX스튜디오 · 조별 입력</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  body {
    min-height: 100%;
    background: radial-gradient(1000px 700px at 50% -20%, var(--paper-2), var(--paper));
    display: flex;
    flex-direction: column;
  }

  /* 상단 바 */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
  }
  .topbar .brand { font-family: var(--serif); letter-spacing: 0.06em; font-size: 0.95rem; color: var(--ink); font-weight: 600; }
  .conn { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); }

  /* 본문 */
  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 32px 24px 48px;
  }
  .panel { width: min(720px, 100%); animation: rise 0.5s ease both; }

  /* 조 선택 */
  #picker .overline { display: block; text-align: center; margin-bottom: 10px; }
  #picker h2 {
    font-family: var(--serif); text-align: center;
    font-size: clamp(1.6rem, 4vw, 2.2rem); margin-bottom: 28px;
  }
  .group-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  }
  .group-btn {
    aspect-ratio: 1.3 / 1;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--white);
    font-family: var(--serif);
    font-size: 1.5rem;
    display: grid; place-items: center;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
  }
  .group-btn span { font-size: 0.7rem; font-family: var(--sans); color: var(--muted); display:block; }
  .group-btn:hover { transform: translateY(-3px); border-color: var(--gold); color: var(--gold); }

  /* 입력 */
  #composer { display: none; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--serif); font-size: 1rem; color: var(--gold);
    margin-bottom: 22px;
  }
  .badge b { font-size: 1.4rem; }
  .qlabel { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 10px; }
  .question {
    font-family: var(--serif);
    font-size: clamp(1.7rem, 4.2vw, 2.4rem);
    line-height: 1.28; letter-spacing: -0.01em;
    margin-bottom: 28px;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--white);
    padding: 18px 20px;
    font-size: 1.15rem;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(176,132,51,0.12); }
  .row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; gap: 16px; }
  .count { font-size: 0.8rem; color: var(--muted); }
  .send {
    background: var(--ink); color: var(--paper);
    padding: 15px 34px; border-radius: 999px;
    font-size: 1.05rem; font-weight: 600;
    transition: transform 0.15s, opacity 0.2s, background 0.2s;
  }
  .send:hover { transform: translateY(-2px); }
  .send:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

  /* 전송 완료 */
  .sent-flash {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: rgba(22,20,15,0.78); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 50;
  }
  .sent-flash.show { opacity: 1; }
  .sent-card {
    text-align: center; color: var(--paper);
    transform: scale(0.9); transition: transform 0.35s cubic-bezier(.2,.9,.3,1.3);
  }
  .sent-flash.show .sent-card { transform: scale(1); }
  .sent-card .check {
    width: 72px; height: 72px; margin: 0 auto 18px;
    border: 2px solid var(--gold-soft); border-radius: 50%;
    display: grid; place-items: center; font-size: 2rem; color: var(--gold-soft);
  }
  .sent-card h3 { font-family: var(--serif); font-size: 1.8rem; margin-bottom: 8px; }
  .sent-card p { color: rgba(246,241,231,0.7); }
</style>
</head>
<body class="grain">
  <div class="topbar">
    <div class="brand">롱블랙 &times; 현대자동차 UX스튜디오</div>
    <div class="conn"><span class="status-dot" id="dot"></span><span id="connText">연결 중…</span></div>
  </div>

  <main>
    <!-- 조 선택 -->
    <section class="panel" id="picker">
      <span class="overline">SELECT YOUR TABLE</span>
      <h2>우리 조 번호를 선택해 주세요</h2>
      <div class="group-grid" id="groupGrid"></div>
    </section>

    <!-- 입력 -->
    <section class="panel" id="composer">
      <div class="badge"><b id="myGroup">1조</b></div>
      <div class="question" id="question">질문을 불러오는 중…</div>
      <textarea id="answer" maxlength="300" placeholder="우리 조의 생각을 적어주세요. 전송 버튼을 누르면 무대 스크린에 공개됩니다."></textarea>
      <div class="row">
        <span class="count"><span id="count">0</span> / 300</span>
        <button class="send" id="sendBtn" disabled>전송 →</button>
      </div>
    </section>
  </main>

  <!-- 전송 완료 오버레이 -->
  <div class="sent-flash" id="flash">
    <div class="sent-card">
      <div class="check">✓</div>
      <h3>전송 완료!</h3>
      <p id="flashText">진행자가 무대에 올려드릴 거예요</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/group.js"></script>
</body>
</html>
